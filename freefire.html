<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYOUBE SHOP | متجر الشحن البريميوم</title>
    <style>
        :root {
            --bg-dark: #070a13; 
            --accent-glow: #38bdf8; 
            --text-white: #f8fafc;
            --glass-border: rgba(56, 189, 248, 0.2);
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* الهيدر الأصلي */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 6%;
            background: rgba(7, 10, 19, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .header-actions { display: flex; align-items: center; gap: 15px; }

        .action-icon {
            cursor: pointer;
            color: var(--accent-glow);
            display: flex;
            align-items: center;
        }

        .action-icon svg {
            width: 26px; height: 26px;
            fill: none; stroke: currentColor;
            stroke-width: 2;
            filter: drop-shadow(0 0 5px rgba(56, 189, 248, 0.5));
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(to right, #fff, var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-section { display: flex; align-items: center; gap: 15px; }

        .logo-img {
            width: 50px; height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-glow);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        /* قسم خدمات فري فاير */
        .section-title {
            text-align: center;
            margin: 40px 0 20px;
            font-size: 28px;
            font-weight: bold;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px 6%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* كارت الجواهر */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-glow);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.15);
        }

        .product-card img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(56, 189, 248, 0.4));
        }

        .diamond-count {
            display: block;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .price-tag {
            display: block;
            color: var(--accent-glow);
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .buy-btn {
            background: linear-gradient(45deg, #1d4ed8, var(--accent-glow));
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .buy-btn:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        @media (max-width: 768px) {
            .logo-text { font-size: 18px; }
            .services-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
            .product-card { padding: 15px; }
            .product-card img { width: 80px; height: 80px; }
            .diamond-count { font-size: 16px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-actions">
            <div class="action-icon">
                <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div class="action-icon">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>

        </div>

            </div>
            <img src="https://i.postimg.cc/5N51xMt3/IMG-7023.jpg" class="logo-img" alt="Logo">
        </div>
    </header>

    <main class="main-content">

        <div class="services-grid">
            
            <div class="product-card">

                <span class="price-tag">15.00 DH</span>

            </div>

            <div class="product-card">

                <span class="diamond-count">Top Up 230 Free Fire</span>

                <button class="buy-btn">شراء الآن</button>
            </div>

            <div class="product-card">
                <img src="https://i.postimg.cc/8zrT7vc5/IMG-7126.webp" alt="Diamonds">
                <span class="diamond-count">Top Up 580 Free Fire</span>
                <span class="price-tag">65.00 DH</span>
                <button class="buy-btn">شراء الآن</button>
            </div>

            <div class="product-card">

            </div>

            <div class="product-card">

                <span class="diamond-count">Top Up 2420 Free Fire</span>
                <span class="price-tag">260.00 DH</span>
                <button class="buy-btn">شراء الآن</button>
            </div>

            <div class="product-card">
                <img src="https://i.postimg.cc/d3xLYKH2/IMG-7129.webp" alt="Diamonds">
                <span class="diamond-count">Top Up 4840 Free Fire</span>
                <span class="price-tag">510.00 DH</span>
                <button class="buy-btn">شراء الآن</button>
            </div>

        </div>

    </main>

</body>
</html>
