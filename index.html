<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYOUBE SHOP | متجر الشحن البريميوم</title>
    <style>
        :root {
            --bg-dark: #070a13; 
            --bg-cards: rgba(17, 24, 39, 0.8); 
            --accent-main: #1d4ed8; 
            --accent-glow: #38bdf8; 
            --text-white: #f8fafc;
            --text-gray: #94a3b8;
            --glass-border: rgba(56, 189, 248, 0.2);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            line-height: 1.6;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 6%;
            background: rgba(7, 10, 19, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 50px; 
            height: 50px;
            border-radius: 50%; 
            object-fit: cover;
            border: 2px solid var(--accent-glow);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(to right, #fff, var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .action-icon {
            cursor: pointer;
            color: var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-icon svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 5px rgba(56, 189, 248, 0.5));
        }

        .hero-banner {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .main-banner {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            border-radius: 30px;
            background: url('https://i.postimg.cc/QMJW5zSY/IMG-7025.webp') no-repeat center center;
            background-size: cover;
            background-color: #0f172a;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .main-banner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(7, 10, 19, 0.4));
        }

        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .section-title span {
            color: var(--accent-glow);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .game-card {
            background: var(--bg-cards);
            border-radius: 20px; 
            overflow: hidden;
            border: 1px solid var(--glass-border);
            text-align: center;
            padding-bottom: 15px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-glow);
        }

        .card-img-area {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1; 
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(56, 189, 248, 0.05));
            border-bottom: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .game-icon-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .card-img-area::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(7, 10, 19, 0.8), transparent);
            z-index: 1;
        }

        .game-title {
            position: relative;
            z-index: 2; 
            font-size: 1rem;
            font-weight: 800;
            margin: 10px 0 5px 0;
            color: #fff;
        }

        .game-title span {
            display: block;
            font-size: 0.75rem; 
            font-weight: 600;
            color: var(--text-gray); 
            margin-top: 2px; 
            letter-spacing: 0.5px;
        }

        footer {
            padding: 80px 20px;
            text-align: center;
            background: #05070c;
            border-top: 1px solid var(--glass-border);
        }

        .footer-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover; margin-bottom: 20px;
            border: 2px solid var(--accent-glow);
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .section-title { font-size: 1.5rem; }
            .logo-text { font-size: 18px; }
            header { padding: 10px 4%; }
            .game-title { font-size: 0.8rem; margin: 8px 0 4px 0; }
            .game-title span { font-size: 0.6rem; }
        }
    </style>
</head>
